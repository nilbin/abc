name: docs

on:
  push:
    branches: [main]
  workflow_dispatch:

# Deployment is a push to the gh-pages branch (mkdocs gh-deploy): GitHub auto-enables
# Pages from that branch, which the Actions token CAN do — creating a Pages site via
# the API (actions/configure-pages enablement) needs repo-admin rights it doesn't have.
permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build site (strict — broken links fail)
        run: |
          pip install mkdocs-material
          sed 's|(docs/|(|g' STATUS.md > docs/status.md
          mkdocs build --strict
      - name: Deploy to gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdocs gh-deploy --force --no-history
