name: docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build site (strict — broken links fail)
        run: |
          pip install mkdocs-material
          sed 's|(docs/|(|g' STATUS.md > docs/status.md
          mkdocs build --strict
      # Creates the Pages site on first run (needs a PUBLIC repo or a plan with Pages) —
      # tolerated-if-failing so the strict BUILD above still gates every push; the probe
      # below decides whether deployment can proceed.
      - uses: actions/configure-pages@v5
        continue-on-error: true
        with:
          enablement: true
      - name: Pages available?
        id: pages
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ github.token }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/pages")
          echo "enabled=$([ "$code" = "200" ] && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "Pages API returned $code"
      - uses: actions/upload-pages-artifact@v3
        if: steps.pages.outputs.enabled == 'true'
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
        if: steps.pages.outputs.enabled == 'true'
