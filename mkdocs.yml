site_name: Tam — Typed Application Model
site_description: A model-driven framework for multi-tenant business applications (.NET + React)
site_url: https://nilbin.github.io/abc/
repo_url: https://github.com/nilbin/abc
docs_dir: docs
theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      toggle: { icon: material/brightness-7, name: Dark mode }
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      toggle: { icon: material/brightness-4, name: Light mode }
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.suggest
markdown_extensions:
  - admonition
  - pymdownx.superfences
  - pymdownx.highlight
  - tables
  - toc:
      permalink: true
